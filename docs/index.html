<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#070a11">
  <script>
    // 描画前にテーマを適用(ちらつき防止)。設定値: system | light | dark
    (function () {
      try {
        var pref = JSON.parse(localStorage.getItem('kintore:theme') || '"system"');
        var light = pref === 'light' || (pref === 'system' && matchMedia('(prefers-color-scheme: light)').matches);
        if (light) document.documentElement.setAttribute('data-theme', 'light');
      } catch (e) { /* 既定のダークのまま */ }
    })();
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="筋トレ記録">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="css/style.css">
  <title>筋トレ記録 — トレーニング・食事・睡眠</title>
</head>
<body>
  <div id="app">
    <section id="view-workout" class="view active"></section>
    <section id="view-history" class="view"></section>
    <section id="view-graph" class="view"></section>
    <section id="view-menu" class="view"></section>
    <section id="view-condition" class="view"></section>
    <section id="view-settings" class="view"></section>
  </div>

  <nav class="tabbar">
    <button data-tab="workout" class="active" aria-label="記録">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6M7 6.5v11M17 6.5v11M20 9v6M7 12h10"/></svg></button>
    <button data-tab="history" aria-label="履歴">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16.5" rx="2.5"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg></button>
    <button data-tab="graph" aria-label="グラフ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15l4.5-5 3.5 3.5L20 6M15.5 6H20v4.5"/></svg></button>
    <button data-tab="menu" aria-label="メニュー">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 7h11M9 12h11M9 17h11"/><circle cx="4.5" cy="7" r="1.3" fill="currentColor" stroke="none"/><circle cx="4.5" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="4.5" cy="17" r="1.3" fill="currentColor" stroke="none"/></svg></button>
    <button data-tab="condition" aria-label="体調">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19.5C6.8 15.6 4 12.7 4 9.6 4 7.5 5.6 6 7.5 6c1.5 0 2.7.8 3.4 1.9l1.1 1.6 1.1-1.6C13.8 6.8 15 6 16.5 6 18.4 6 20 7.5 20 9.6c0 3.1-2.8 6-8 9.9z"/></svg></button>
  </nav>

  <script src="js/storage.js"></script>
  <script src="js/data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
