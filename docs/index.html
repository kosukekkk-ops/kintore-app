<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#070a11">
  <script>
    // 描画前にテーマを適用(ちらつき防止)。設定値: system | light | dark
    (function () {
      try {
        var pref = JSON.parse(localStorage.getItem('kintore:theme') || '"system"');
        var light = pref === 'light' || (pref === 'system' && matchMedia('(prefers-color-scheme: light)').matches);
        if (light) document.documentElement.setAttribute('data-theme', 'light');
      } catch (e) { /* 既定のダークのまま */ }
    })();
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="筋トレ記録">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="css/style.css">
  <title>筋トレ記録 — トレーニング・食事・睡眠</title>
</head>
<body>
  <div id="app">
    <section id="view-workout" class="view active"></section>
    <section id="view-history" class="view"></section>
    <section id="view-graph" class="view"></section>
    <section id="view-menu" class="view"></section>
    <section id="view-condition" class="view"></section>
    <section id="view-settings" class="view"></section>
  </div>

  <nav class="tabbar">
    <button data-tab="workout" class="active"><span class="ico">🏋️</span>記録</button>
    <button data-tab="history"><span class="ico">📅</span>履歴</button>
    <button data-tab="graph"><span class="ico">📈</span>グラフ</button>
    <button data-tab="menu"><span class="ico">📋</span>メニュー</button>
    <button data-tab="condition"><span class="ico">🌙</span>体調</button>
  </nav>

  <script src="js/storage.js"></script>
  <script src="js/data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
